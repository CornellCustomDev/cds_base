'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Section - One Column
description: A one column section.
status: experimental
group: Layout
props:
  type: object
  properties:
    background_color:
      type: string
      title: Background color
      enum:
        - navy
        - red
        - gray
      meta:enum:
        navy: Navy
        red: Red
        gray: Gray
    background_tint:
      type: boolean
      title: 'Background tint'
      description: 'Slightly darkens the background color'
      examples: [ false ]
    padding:
      type: string
      title: Padding
      enum:
        - default
        - small
        - medium
        - large
      meta:enum:
        default: Default
        small: Small
        medium: Medium
        large: Large
      examples:
        - default
      default:
        - default
    region_css_class:
      type: string
      title: Region classes
      description: 'A space separated list of CSS classes to apply to the region.'
    layout_css_class:
      type: string
      title: Layout classes
      description: 'A space separated list of CSS classes to apply to layout.'

slots:
  col:
    title: "Content"
