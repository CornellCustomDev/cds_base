'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Section - Two Column
description: A two column section.
status: experimental
group: Layout
props:
  type: object
  required:
    - columns
  properties:
    columns:
      type: string
      title: Grid layout
      description: Layout selected applies on desktop and tablet.
      enum:
        - "50-50"
        - "33-66"
        - "66-33"
        - "40-60"
        - "60-40"
        - "25-75"
        - "75-25"
        - "20-80"
        - "80-20"
      examples:
        - "50-50"
      default:
        - "50-50"
    background_color:
      type: string
      title: Background color
      enum:
        - navy
        - red
        - gray
      meta:enum:
        navy: Navy
        red: Red
        gray: Gray
    background_tint:
      type: boolean
      title: 'Background tint'
      description: 'Slightly darkens the background color'
      examples: [ false ]
    padding:
      type: string
      title: Padding
      enum:
        - default
        - small
        - medium
        - large
      meta:enum:
        default: Default
        small: Small
        medium: Medium
        large: Large
      examples:
        - default
      default:
        - default

slots:
  col_1:
    title: "Column One"
  col_2:
    title: "Column Two"
